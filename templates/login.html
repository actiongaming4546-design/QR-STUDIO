<!DOCTYPE html>
<html>
<head>

<title>Login - QR Studio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg, #0f1117 0%, #1a1d29 100%);
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background: rgba(31, 33, 47, 0.9);
padding:50px;
border-radius:20px;
width:400px;
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 8px 32px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:30px;
font-size:2rem;
background: linear-gradient(45deg, #ffffff, #4c7cff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background: rgba(255,255,255,0.05);
color:white;
font-size:16px;
transition: all 0.3s ease;
}

input:focus{
outline:none;
border-color:#4c7cff;
box-shadow: 0 0 0 3px rgba(76,124,255,0.2);
background: rgba(255,255,255,0.1);
}

button{
width:100%;
margin-top:25px;
padding:15px;
border:none;
background: linear-gradient(45deg, #4c7cff, #6d93ff);
color:white;
border-radius:25px;
cursor:pointer;
font-size:16px;
font-weight:600;
transition: all 0.3s ease;
box-shadow: 0 4px 15px rgba(76,124,255,0.3);
}

button:hover{
transform: translateY(-2px);
box-shadow: 0 8px 25px rgba(76,124,255,0.4);
}

p{
margin-top:20px;
opacity:0.8;
}

a{
color:#4c7cff;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

@media (max-width: 768px) {
.card{
width:90%;
padding:30px;
}
}

</style>

</head>

<body>

<div class="card">

<h2><i class="fas fa-sign-in-alt"></i> Login</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash" style="background:#ff4d4d;padding:10px;border-radius:8px;margin-bottom:15px;">
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}

<form method="POST">
    {{ form.hidden_tag() }}
    <input name="email" placeholder="Email" required>
    <input name="password" placeholder="Password" type="password" required>
    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="/register">Register</a></p>

</div>

</body>
</html>
