<!DOCTYPE html>
<html>
<head>

<title>QR Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f1117;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:#151823;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#1b1f2b;
padding:30px;
border-radius:12px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
text-align:left;
}

button{
margin-top:10px;
padding:12px 18px;
border:none;
background:#4c7cff;
color:white;
border-radius:8px;
cursor:pointer;
}

#qr{
margin-top:20px;
text-align:center;
}

.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tab-button {
    background: #151823;
    border: none;
    color: white;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
}

.tab-button.active {
    background: #1b1f2b;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

@media (max-width: 768px) {
    .container {
        padding: 10px;
    }
    .card {
        padding: 20px;
    }
    .tabs {
        flex-direction: column;
    }
}

</style>

</head>

<body>

<header>

<div class="logo">QR Studio</div>

<div>
<a href="/"><i class="fas fa-home"></i> Home</a>
<a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

</header>

<div class="container">

<h2><i class="fas fa-qrcode"></i> Create QR Code</h2>

<div class="tabs">
    <button class="tab-button active" onclick="showTab('url')"><i class="fas fa-link"></i> URL</button>
    <button class="tab-button" onclick="showTab('wifi')"><i class="fas fa-wifi"></i> WiFi</button>
    <button class="tab-button" onclick="showTab('phone')"><i class="fas fa-phone"></i> Phone</button>
    <button class="tab-button" onclick="showTab('sms')"><i class="fas fa-sms"></i> SMS</button>
    <button class="tab-button" onclick="showTab('email')"><i class="fas fa-envelope"></i> Email</button>
    <button class="tab-button" onclick="showTab('contact')"><i class="fas fa-user"></i> Contact</button>
    <button class="tab-button" onclick="showTab('location')"><i class="fas fa-map-marker-alt"></i> Location</button>
</div>

<form id="qrForm" method="POST" action="/generate" enctype="multipart/form-data">
    <input type="hidden" name="type" id="qrType" value="url">

    <div id="url" class="tab-content active">
        <div class="card">
            <label><i class="fas fa-link"></i> Enter URL</label>
            <input name="url" placeholder="https://example.com">
        </div>
    </div>

    <div id="wifi" class="tab-content">
        <div class="card">
            <label><i class="fas fa-wifi"></i> WiFi Name (SSID)</label>
            <input name="ssid" placeholder="MyWiFi">
            <label><i class="fas fa-lock"></i> Password</label>
            <input name="password" placeholder="password" type="password">
            <label><i class="fas fa-shield-alt"></i> Encryption</label>
            <select name="encryption">
                <option value="WPA">WPA</option>
                <option value="WEP">WEP</option>
                <option value="nopass">No Password</option>
            </select>
        </div>
    </div>

    <div id="phone" class="tab-content">
        <div class="card">
            <label><i class="fas fa-phone"></i> Phone Number</label>
            <input name="phone" placeholder="+1234567890">
        </div>
    </div>

    <div id="sms" class="tab-content">
        <div class="card">
            <label><i class="fas fa-sms"></i> Phone Number</label>
            <input name="phone" placeholder="+1234567890">
        </div>
    </div>

    <div id="email" class="tab-content">
        <div class="card">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input name="email" placeholder="user@example.com">
        </div>
    </div>

    <div id="contact" class="tab-content">
        <div class="card">
            <label><i class="fas fa-phone"></i> Phone</label>
            <input name="phone" placeholder="+1234567890">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input name="email" placeholder="john@example.com">
        </div>
    </div>

    <div id="location" class="tab-content">
        <div class="card">
            <label><i class="fas fa-map-marker-alt"></i> Address</label>
            <input name="address" placeholder="1600 Amphitheatre Parkway, Mountain View, CA">
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-palette"></i> Customization</h3>
        <label><i class="fas fa-image"></i> Logo (optional)</label>
        <input name="logo" type="file" accept="image/*">
        <label><i class="fas fa-file-download"></i> Format</label>
        <select name="format">
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="svg">SVG</option>
            <option value="pdf">PDF</option>
        </select>
        <button type="button" onclick="previewQR()"><i class="fas fa-eye"></i> Preview</button>
        <button type="submit"><i class="fas fa-download"></i> Download</button>
    </div>
</form>

<div id="preview" class="card" style="display:none;">
    <h3><i class="fas fa-image"></i> Preview</h3>
    <img id="qrPreview" src="" alt="QR Code Preview">
</div>

</div>

<script>

function showTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(button => button.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.querySelector(`button[onclick="showTab('${tabName}')"]`).classList.add('active');
    document.getElementById('qrType').value = tabName;
}

function previewQR() {
    const formData = new FormData(document.getElementById('qrForm'));
    fetch('/preview', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            document.getElementById('qrPreview').src = data.image;
            document.getElementById('preview').style.display = 'block';
        }
    })
    .catch(error => console.error('Error:', error));
}

</script>

</body>
</html>
